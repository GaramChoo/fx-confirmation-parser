<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월별 거래 대장</title>
<style>
  :root {
    --bg: #f9f9f8; --surface: #fff; --border: #e2e2df; --border-strong: #c8c8c4;
    --text: #1a1a18; --text-muted: #6b6b67; --accent: #1a1a18;
    --radius: 10px; --radius-sm: 6px;
    --font: -apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;
    --mono: 'JetBrains Mono','Fira Code','Consolas',monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-title { font-size: 14px; font-weight: 600; }
  .nav-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); text-decoration: none; padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); }
  .nav-link:hover { border-color: var(--border-strong); color: var(--text); }

  .main { max-width: 1200px; margin: 0 auto; padding: 28px 24px 80px; }

  .acct-tabs { display: flex; margin-bottom: 20px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; width: fit-content; }
  .acct-tab { padding: 8px 24px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: var(--surface); color: var(--text-muted); font-family: var(--font); transition: all .15s; }
  .acct-tab:not(:last-child) { border-right: 1px solid var(--border); }
  .acct-tab.active { background: var(--accent); color: #fff; }

  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .toolbar-title { font-size: 15px; font-weight: 600; flex: 1; min-width: 120px; }
  .month-select { padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--surface); color: var(--text); font-family: var(--font); outline: none; }
  .month-select:focus { border-color: var(--accent); }

  .btn { padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; font-family: var(--font); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .85; }
  .btn-outline { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--border-strong); }
  .btn-danger { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
  .btn-danger:hover { background: #fee2e2; }
  .btn-green { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }
  .btn-green:hover { background: #dcfce7; }

  .section { margin-bottom: 32px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .section-title { font-size: 13px; font-weight: 600; }
  .section-actions { display: flex; gap: 8px; align-items: center; }

  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; background: var(--surface); }
  thead th { background: #f5f5f3; padding: 9px 12px; text-align: left; font-weight: 600; font-size: 12px; color: var(--text-muted); white-space: nowrap; border-bottom: 1px solid var(--border); }
  tbody td { padding: 6px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #fafaf8; }
  .td-edit { padding: 5px 8px; font-size: 12.5px; font-family: var(--font); border: 1px solid transparent; border-radius: 4px; background: transparent; width: 100%; min-width: 80px; color: var(--text); outline: none; }
  .td-edit:focus { border-color: var(--border-strong); background: var(--surface); }
  .td-del { background: none; border: none; cursor: pointer; color: #d1d5db; font-size: 15px; padding: 2px 6px; }
  .td-del:hover { color: #ef4444; }
  .empty-row td { text-align: center; color: var(--text-muted); font-size: 13px; padding: 24px; }

  .paste-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; }
  .paste-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
  .paste-area { width: 100%; min-height: 80px; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12.5px; font-family: var(--mono); resize: vertical; background: var(--surface); color: var(--text); outline: none; }
  .paste-area:focus { border-color: var(--accent); }

  .copy-flash { animation: flash .4s ease; }
  @keyframes flash { 0%,100%{background:var(--surface)} 50%{background:#f0fdf4} }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #fff; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">📋 월별 거래 대장</div>
  <a href="index.html" class="nav-link">← 컨펌 파서</a>
</div>

<div class="main">

  <!-- 계정 탭 -->
  <div class="acct-tabs">
    <button class="acct-tab active" id="tab-general" onclick="setAcct('general')">일반계정</button>
    <button class="acct-tab" id="tab-special" onclick="setAcct('special')">특별계정</button>
  </div>

  <!-- 툴바 -->
  <div class="toolbar">
    <div class="toolbar-title" id="page-title">거래 대장</div>
    <select class="month-select" id="month-select" onchange="loadMonth()"></select>
    <button class="btn btn-outline" onclick="newMonth()">+ 월 추가</button>
    <button class="btn btn-outline" onclick="togglePaste()">📥 보고서 붙여넣기</button>
    <button class="btn btn-danger" onclick="clearMonth()">월 초기화</button>
  </div>

  <!-- 보고서 붙여넣기 패널 -->
  <div class="paste-panel" id="paste-panel" style="display:none">
    <div class="paste-label">내부결재용 보고서 텍스트 붙여넣기 → 자동 파싱</div>
    <textarea class="paste-area" id="paste-text" placeholder="컨펌 파서에서 생성된 내부결재용 보고서 텍스트를 여기 붙여넣으세요..."></textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-primary" onclick="parsePasted()">파싱해서 추가</button>
      <button class="btn btn-outline" onclick="document.getElementById('paste-text').value=''">지우기</button>
    </div>
    <div id="paste-msg" style="font-size:12px;color:var(--text-muted);margin-top:6px;min-height:18px"></div>
  </div>

  <!-- 헤지 거래 표 -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">CCS / FX Swap 헤지 거래</div>
      <div class="section-actions">
        <button class="btn btn-green" onclick="copyTSV('hedge')">Excel 복사</button>
        <button class="btn btn-outline" onclick="addRow('hedge')">+ 행 추가</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="hedge-table">
        <thead><tr>
          <th>거래일자</th><th>거래 종류</th><th>헤지 대상</th><th>통화</th>
          <th>헤지 액면금액</th><th>결제일</th><th>만기일</th><th>스왑마진</th>
          <th>거래상대</th><th>ISIN</th><th style="width:32px"></th>
        </tr></thead>
        <tbody id="hedge-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 외화매도 표 -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">외화 매도</div>
      <div class="section-actions">
        <button class="btn btn-green" onclick="copyTSV('sell')">Excel 복사</button>
        <button class="btn btn-outline" onclick="addRow('sell')">+ 행 추가</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="sell-table">
        <thead><tr>
          <th>거래일자</th><th>거래 방향</th><th>통화</th><th>금액</th><th>결제일</th>
          <th style="width:32px"></th>
        </tr></thead>
        <tbody id="sell-tbody"></tbody>
      </table>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── 상수 & 상태 ───────────────────────────────────────────
const HEDGE_COLS = 10;
const SELL_COLS  = 5;
let acct  = localStorage.getItem('ldg_acct')  || 'general';
let month = localStorage.getItem('ldg_month') || '';

// ── 스토리지 키 ───────────────────────────────────────────
function hKey() { return `ldg_hedge_${acct}_${month}`; }
function sKey() { return `ldg_sell_${acct}_${month}`; }
function mKey() { return 'ldg_months'; }
function getRows(k)      { try { return JSON.parse(localStorage.getItem(k) || '[]'); } catch(e) { return []; } }
function saveRows(k, arr){ localStorage.setItem(k, JSON.stringify(arr)); }
function getMonths()     { try { return JSON.parse(localStorage.getItem(mKey()) || '[]'); } catch(e) { return []; } }
function saveMonths(arr) { localStorage.setItem(mKey(), JSON.stringify(arr)); }
function ensureMonth(m)  { const ms = getMonths(); if (!ms.includes(m)) { ms.push(m); saveMonths(ms); } }

// ── 초기화 ────────────────────────────────────────────────
window.addEventListener('load', () => {
  document.getElementById('tab-general').classList.toggle('active', acct === 'general');
  document.getElementById('tab-special').classList.toggle('active', acct === 'special');
  buildMonthSelect();
  if (month) document.getElementById('month-select').value = month;
  updateTitle();
  renderAll();
});

// ── 계정 전환 ─────────────────────────────────────────────
function setAcct(a) {
  acct = a;
  localStorage.setItem('ldg_acct', a);
  document.getElementById('tab-general').classList.toggle('active', a === 'general');
  document.getElementById('tab-special').classList.toggle('active', a === 'special');
  updateTitle();
  renderAll();
}

// ── 월 관리 ───────────────────────────────────────────────
function buildMonthSelect() {
  const sel = document.getElementById('month-select');
  let ms = getMonths();
  if (ms.length === 0) {
    const now = new Date();
    const m = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    ms = [m]; saveMonths(ms);
    if (!month) { month = m; localStorage.setItem('ldg_month', m); }
  }
  sel.innerHTML = '';
  [...ms].sort().reverse().forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m.replace('-', '년 ') + '월';
    sel.appendChild(opt);
  });
  if (month) sel.value = month;
}

function loadMonth() {
  month = document.getElementById('month-select').value;
  localStorage.setItem('ldg_month', month);
  updateTitle();
  renderAll();
}

function newMonth() {
  const input = prompt('추가할 월을 입력하세요 (예: 2026-07)');
  if (!input) return;
  const m = input.trim();
  if (!/^\d{4}-\d{2}$/.test(m)) { alert('형식: YYYY-MM'); return; }
  ensureMonth(m);
  month = m;
  localStorage.setItem('ldg_month', m);
  buildMonthSelect();
  document.getElementById('month-select').value = m;
  updateTitle();
  renderAll();
}

function clearMonth() {
  if (!month) return;
  if (!confirm(`${acct === 'general' ? '일반계정' : '특별계정'} ${month} 데이터를 모두 삭제할까요?`)) return;
  localStorage.removeItem(hKey());
  localStorage.removeItem(sKey());
  renderAll();
}

function updateTitle() {
  const label = acct === 'general' ? '일반계정' : '특별계정';
  const mLabel = month ? month.replace('-', '년 ') + '월' : '';
  document.getElementById('page-title').textContent = mLabel ? `${label} · ${mLabel} 거래 대장` : `${label} 거래 대장`;
}

// ── 렌더링 ────────────────────────────────────────────────
function renderAll() { renderHedge(); renderSell(); }

function renderHedge() {
  const rows = month ? getRows(hKey()) : [];
  const tbody = document.getElementById('hedge-tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="${HEDGE_COLS+1}">거래 없음 — 컨펌 파서에서 추가하거나 + 행 추가를 클릭하세요</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map((row, i) =>
    `<tr>${Array.from({length:HEDGE_COLS},(_,c) =>
      `<td><input class="td-edit" value="${esc(row[c])}" onchange="edit('hedge',${i},${c},this.value)"></td>`
    ).join('')}<td><button class="td-del" onclick="delRow('hedge',${i})">×</button></td></tr>`
  ).join('');
}

function renderSell() {
  const rows = month ? getRows(sKey()) : [];
  const tbody = document.getElementById('sell-tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="${SELL_COLS+1}">거래 없음</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map((row, i) =>
    `<tr>${Array.from({length:SELL_COLS},(_,c) =>
      `<td><input class="td-edit" value="${esc(row[c])}" onchange="edit('sell',${i},${c},this.value)"></td>`
    ).join('')}<td><button class="td-del" onclick="delRow('sell',${i})">×</button></td></tr>`
  ).join('');
}

function esc(v) { return (v||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── 편집 / 삭제 / 추가 ───────────────────────────────────
function edit(type, i, c, v) {
  if (!month) return;
  const k = type === 'hedge' ? hKey() : sKey();
  const rows = getRows(k);
  if (!rows[i]) return;
  while (rows[i].length <= c) rows[i].push('');
  rows[i][c] = v;
  saveRows(k, rows);
}

function delRow(type, i) {
  if (!month) return;
  const k = type === 'hedge' ? hKey() : sKey();
  const rows = getRows(k);
  rows.splice(i, 1);
  saveRows(k, rows);
  type === 'hedge' ? renderHedge() : renderSell();
}

function addRow(type) {
  if (!month) return;
  const cols = type === 'hedge' ? HEDGE_COLS : SELL_COLS;
  const k = type === 'hedge' ? hKey() : sKey();
  const rows = getRows(k);
  rows.push(Array(cols).fill(''));
  saveRows(k, rows);
  type === 'hedge' ? renderHedge() : renderSell();
  setTimeout(() => {
    const inputs = document.querySelectorAll(`#${type==='hedge'?'hedge':'sell'}-tbody input.td-edit`);
    if (inputs.length) inputs[inputs.length - cols].focus();
  }, 50);
}

// ── TSV 복사 (헤더 제외) ──────────────────────────────────
function copyTSV(type) {
  if (!month) return;
  const cols = type === 'hedge' ? HEDGE_COLS : SELL_COLS;
  const rows = getRows(type === 'hedge' ? hKey() : sKey());
  if (!rows.length) { showToast('데이터가 없습니다'); return; }

  const lines = rows.map(row =>
    Array.from({length: cols}, (_, i) => (row[i] || '').toString()).join('\t')
  );
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    showToast('복사됐습니다 — Excel에 붙여넣기 하세요');
    const tbl = document.getElementById(type === 'hedge' ? 'hedge-table' : 'sell-table');
    tbl.classList.add('copy-flash');
    setTimeout(() => tbl.classList.remove('copy-flash'), 400);
  });
}

// ── 보고서 붙여넣기 ───────────────────────────────────────
function togglePaste() {
  const p = document.getElementById('paste-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

function parsePasted() {
  const text = document.getElementById('paste-text').value.trim();
  if (!text) return;
  if (!month) { alert('먼저 월을 선택하세요'); return; }

  let added = 0;

  // CCS
  const ccsBlocks = [...text.matchAll(/\d+\.\s*CCS([\s\S]*?)(?=\n\d+\.\s|\n\n다음과|$)/g)];
  ccsBlocks.forEach(m => {
    const b = m[0];
    const td   = (b.match(/스왑거래일\s*:\s*(\S+)/) || [])[1] || '';
    const sd   = (b.match(/스왑결제일\s*:\s*(\S+)/) || [])[1] || '';
    const md   = (b.match(/스왑만기일\s*:\s*(\S+)/) || [])[1] || '';
    const not  = (b.match(/Notional\s*:\s*(?:USD|EUR|GBP|AUD|CAD)\s+([\d,]+)/) || [])[1] || '';
    const face = not ? (() => { const n = parseFloat(not.replace(/,/g,'')); return n>=1e6 ? (n/1e6)+'mn' : not; })() : '';
    const bond = (b.match(/헤지대상 채권\s*:\s*(.+?)\s*\(/) || [])[1]?.trim() || '';
    const isin = (b.match(/헤지대상 채권\s*:.+?\((\S+)\)/) || [])[1] || '';
    const bank = ((b.match(/거래기관\s*:\s*(.+)/) || [])[1] || '').split(' ')[0];
    const hy   = (b.match(/헤지수익률\s+([-+\d.]+)%/) || [])[1] || '';
    const ccy  = (b.match(/지급 쿠폰\s*:\s*(USD|EUR|GBP|AUD|CAD)/) || [])[1] || 'USD';
    if (td) { const rows = getRows(hKey()); rows.push([td,'CCS',bond,ccy,face,sd,md,hy,bank,isin]); saveRows(hKey(),rows); added++; }
  });

  // FX Swap
  const fxBlocks = [...text.matchAll(/\d+\.\s*FX Swap([\s\S]*?)(?=\n\d+\.\s|\n\n다음과|$)/g)];
  fxBlocks.forEach(m => {
    const b = m[0];
    const td   = (b.match(/스왑거래일\s*:\s*(\S+)/) || [])[1] || '';
    const sd   = (b.match(/스왑결제일\s*:\s*(\S+)/) || [])[1] || '';
    const md2  = (b.match(/스왑만기일\s*:\s*(\S+)/) || [])[1] || '';
    const nl   = b.match(/Near\s*:\s*(USD|EUR|GBP|AUD|CAD)\s+([\d,]+)/);
    const ccy  = nl ? nl[1] : '';
    const near = nl ? nl[2] : '';
    const face = near ? (() => { const n = parseFloat(near.replace(/,/g,'')); return n>=1e6?(n/1e6)+'mn':near; })() : '';
    const bond = (b.match(/헤지대상 채권\s*:\s*(.+?)\s*\(/) || [])[1]?.trim() || '';
    const isin = (b.match(/헤지대상 채권\s*:.+?\((\S+)\)/) || [])[1] || '';
    const bank = ((b.match(/거래기관\s*:\s*(.+)/) || [])[1] || '').split(' ')[0];
    const hy   = (b.match(/헤지수익률\s+([-+\d.]+)%/) || [])[1] || '';
    if (td) { const rows = getRows(hKey()); rows.push([td,'FX Swap',bond,ccy,face,sd,md2,hy,bank,isin]); saveRows(hKey(),rows); added++; }
  });

  // FX Spot
  const spotBlocks = [...text.matchAll(/\d+\.\s*FX Today Sell([\s\S]*?)(?=\n\d+\.\s|\n\n다음과|$)/g)];
  spotBlocks.forEach(m => {
    const b  = m[0];
    const td = (b.match(/거래일\s*:\s*(\S+)/) || [])[1] || '';
    const vd = (b.match(/결제일\s*:\s*(\S+)/) || [])[1] || '';
    const al = b.match(/거래금액\s*:\s*(USD|EUR|GBP|AUD|CAD|JPY)\s+([\d,]+\.?\d*)/);
    const ccy = al ? al[1] : '';
    const amt = al ? al[2] : '';
    if (td) { const rows = getRows(sKey()); rows.push([td,'외화 매도',ccy,amt,vd]); saveRows(sKey(),rows); added++; }
  });

  const msg = document.getElementById('paste-msg');
  if (added > 0) {
    renderAll();
    document.getElementById('paste-text').value = '';
    msg.textContent = `✓ ${added}건 추가됐습니다`;
    setTimeout(() => msg.textContent = '', 3000);
  } else {
    msg.textContent = '⚠ 파싱된 거래가 없습니다. 내부결재용 보고서 텍스트인지 확인하세요.';
  }
}

// ── 토스트 ────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
